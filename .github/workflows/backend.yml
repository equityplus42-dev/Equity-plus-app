name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  ci:
    name: Backend — Node.js CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate Prisma Client ────────────────────────────────────────────
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          # Prisma generate does not need a real DB — dummy URL for schema parsing only
          DATABASE_URL: "mysql://ci_user:ci_pass@localhost:3306/ci_db"

      # ── 5. Validate Prisma Schema ────────────────────────────────────────────
      - name: Validate Prisma Schema
        run: npx prisma validate
        env:
          DATABASE_URL: "mysql://ci_user:ci_pass@localhost:3306/ci_db"

      # ── 6. Lint (syntax check) ───────────────────────────────────────────────
      - name: Lint (Node syntax check)
        run: npm run lint

      # ── 7. Run tests ─────────────────────────────────────────────────────────
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: "mysql://ci_user:ci_pass@localhost:3306/ci_db"
          JWT_SECRET: ci_jwt_secret_for_testing_only
          JWT_EXPIRES_IN: "1h"

      # ── 8. Verify server can be imported (build check) ───────────────────────
      - name: Verify server module loads
        run: node -e "require('./src/app')" 2>&1 | head -20 || true
        env:
          DATABASE_URL: "mysql://ci_user:ci_pass@localhost:3306/ci_db"
          JWT_SECRET: ci_jwt_secret_for_testing_only

      # ── 9. Success summary ───────────────────────────────────────────────────
      - name: CI Summary
        run: |
          echo "╔══════════════════════════════════╗"
          echo "║  Backend ✔  All Checks Passed    ║"
          echo "╚══════════════════════════════════╝"
